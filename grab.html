<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>抓参数 - Phone Radar</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef5f3;
        --panel: #ffffff;
        --text: #102026;
        --muted: #667780;
        --line: #cfe0df;
        --accent: #008b91;
        --accent-dark: #006a70;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      main {
        width: min(980px, calc(100vw - 32px));
        margin: 32px auto;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
      }

      a {
        color: var(--accent-dark);
        text-decoration: none;
        font-weight: 700;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 18px 45px rgba(28, 54, 60, 0.08);
      }

      .form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
      }

      input,
      button,
      textarea {
        font: inherit;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 13px 14px;
        font-size: 16px;
        outline: none;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(0, 139, 145, 0.12);
      }

      button {
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        padding: 0 18px;
        font-weight: 800;
        cursor: pointer;
      }

      button.secondary {
        background: #e8f4f3;
        color: var(--accent-dark);
        border: 1px solid #b7dbd8;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.68;
      }

      .status {
        min-height: 24px;
        margin: 12px 0 0;
        color: var(--muted);
      }

      .result-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 18px 0 10px;
      }

      .result-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      textarea {
        width: 100%;
        min-height: 58vh;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        line-height: 1.65;
        font-size: 15px;
        color: #17242a;
        background: #fbfdfd;
      }

      .hint {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 720px) {
        main {
          width: min(100vw - 20px, 980px);
          margin: 16px auto;
        }

        header,
        .result-head,
        .form {
          grid-template-columns: 1fr;
          flex-direction: column;
          align-items: stretch;
        }

        button {
          min-height: 46px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>抓手机参数</h1>
          <p class="hint">只适合官方参数页、品牌官网、官方商城参数页。</p>
        </div>
        <a href="./index.html">返回 Phone Radar</a>
      </header>

      <section class="panel">
        <div class="form">
          <input id="urlInput" type="url" placeholder="粘贴手机官网参数页链接" autocomplete="off" />
          <button id="grabButton" type="button">抓取参数</button>
        </div>
        <p id="status" class="status">粘贴链接后点一下就行。</p>

        <div class="result-head">
          <strong>做图版结果</strong>
          <div class="result-actions">
            <button id="copyButton" class="secondary" type="button">复制结果</button>
            <button id="clearButton" class="secondary" type="button">清空</button>
          </div>
        </div>
        <textarea id="resultOutput" spellcheck="false" placeholder="抓取结果会显示在这里"></textarea>
      </section>
    </main>

    <script>
      const urlInput = document.querySelector("#urlInput");
      const grabButton = document.querySelector("#grabButton");
      const copyButton = document.querySelector("#copyButton");
      const clearButton = document.querySelector("#clearButton");
      const statusText = document.querySelector("#status");
      const resultOutput = document.querySelector("#resultOutput");

      grabButton.addEventListener("click", grabSpecs);
      urlInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") grabSpecs();
      });
      copyButton.addEventListener("click", async () => {
        if (!resultOutput.value.trim()) return;
        await navigator.clipboard.writeText(resultOutput.value);
        statusText.textContent = "已复制。";
      });
      clearButton.addEventListener("click", () => {
        urlInput.value = "";
        resultOutput.value = "";
        statusText.textContent = "已清空。";
      });

      async function grabSpecs() {
        const url = urlInput.value.trim();
        if (!/^https?:\/\//i.test(url)) {
          statusText.textContent = "请粘贴 http/https 开头的官方参数页链接。";
          return;
        }

        grabButton.disabled = true;
        statusText.textContent = "正在抓取，稍等几秒...";
        try {
          const response = await fetch("/api/grab-specs", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ url })
          });
          const data = await response.json();
          if (!data.ok) throw new Error(data.error || "抓取失败");
          resultOutput.value = data.markdown || "";
          statusText.textContent = data.markdownFile ? `已生成：${data.markdownFile}` : "抓取完成。";
        } catch (error) {
          statusText.textContent = error.message || "抓取失败。";
        } finally {
          grabButton.disabled = false;
        }
      }
    </script>
  </body>
</html>
